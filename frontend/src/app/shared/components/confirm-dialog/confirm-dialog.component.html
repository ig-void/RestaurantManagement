<div class="fixed inset-0 bg-slate-950/60 backdrop-blur-xs flex items-center justify-center z-55 transition-opacity duration-200" (click)="cancel()">
  <div class="glass-card max-w-md w-[90%] p-6 flex flex-col gap-4" (click)="$event.stopPropagation()">
    <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100">{{ title() }}</h3>
    <p class="text-sm text-slate-500 dark:text-slate-400">{{ message() }}</p>
    <div class="flex justify-end gap-3 mt-4">
      <button 
        class="py-2.5 px-5 rounded-2xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold text-base hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer"
        (click)="cancel()">
        Cancel
      </button>
      <button 
        class="py-2.5 px-5 rounded-2xl bg-red-500 text-white font-semibold text-base hover:bg-red-600 shadow-md shadow-red-500/20 hover:shadow-lg transition-all cursor-pointer"
        (click)="confirmAction()">
        Confirm
      </button>
    </div>
  </div>
</div>
