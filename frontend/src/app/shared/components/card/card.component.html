<div class="glass-card flex flex-col h-full p-6">
  <div class="flex justify-between items-start mb-4 gap-2">
    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-100">{{ restaurantName() }}</h4>
    <app-status-badge [status]="status()"></app-status-badge>
  </div>
  
  <div class="flex-1 flex flex-col gap-2.5 text-sm border-t border-slate-200 dark:border-slate-850/40 pt-4 mb-5">
    <div class="flex justify-between">
      <span class="text-slate-500 dark:text-slate-400 font-medium">Cuisine:</span>
      <span class="text-slate-800 dark:text-slate-200 font-semibold">{{ cuisineType() }}</span>
    </div>
    <div class="flex justify-between">
      <span class="text-slate-500 dark:text-slate-400 font-medium">Date & Time:</span>
      <span class="text-slate-800 dark:text-slate-200 font-semibold">{{ date() }} at {{ time() }}</span>
    </div>
    <div class="flex justify-between">
      <span class="text-slate-500 dark:text-slate-400 font-medium">Guests:</span>
      <span class="text-slate-800 dark:text-slate-200 font-semibold">{{ guestCount() }} guests</span>
    </div>
    
    @if (tableNumber()) {
      <div class="flex justify-between">
        <span class="text-slate-500 dark:text-slate-400 font-medium">Table:</span>
        <span class="text-slate-800 dark:text-slate-200 font-semibold">{{ tableNumber() }} ({{ tableType() }})</span>
      </div>
    }
    
    @if (specialRequests()) {
      <div class="flex justify-between">
        <span class="text-slate-500 dark:text-slate-400 font-medium">Note:</span>
        <span class="text-slate-550 dark:text-slate-400 italic text-right">"{{ specialRequests() }}"</span>
      </div>
    }
  </div>

  @if (showCancelButton()) {
    <div class="border-t border-slate-200 dark:border-slate-850/40 pt-4">
      <button 
        class="w-full py-2 px-4 rounded-xl border border-red-500 text-red-500 dark:text-red-400 font-semibold text-sm hover:bg-red-500 hover:text-white dark:hover:bg-red-500/20 transition-all cursor-pointer"
        (click)="onCancelClick()">
        Cancel Reservation
      </button>
    </div>
  }
</div>
