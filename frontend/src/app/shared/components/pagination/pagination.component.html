@if (totalPages > 1) {
  <div class="flex flex-wrap items-center justify-between mt-6 gap-4">
    <span class="text-sm text-slate-500 dark:text-slate-400 font-medium">
      Showing Page {{ pageNumber }} of {{ totalPages }} (Total {{ totalCount }} items)
    </span>
    <div class="flex gap-1.5 items-center">
      <button 
        class="py-2 px-4 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer" 
        [disabled]="pageNumber === 1" 
        (click)="onPageChange(pageNumber - 1)">
        Previous
      </button>
      
      @for (p of pageNumbers; track p) {
        <button 
          [class]="p === pageNumber ? 'bg-primary text-slate-950 hover:bg-primary-hover font-bold shadow-md shadow-primary/20' : 'border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'"
          class="py-2 px-4 rounded-xl text-sm font-semibold transition-all cursor-pointer"
          (click)="onPageChange(p)">
          {{ p }}
        </button>
      }
      
      <button 
        class="py-2 px-4 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer" 
        [disabled]="pageNumber === totalPages" 
        (click)="onPageChange(pageNumber + 1)">
        Next
      </button>
    </div>
  </div>
}
