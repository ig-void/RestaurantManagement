<div class="relative min-h-[calc(100vh-70px)] flex items-center justify-center p-6 overflow-hidden">
  <!-- Glowing Aurora background effects -->
  <div class="aurora-glow-1"></div>
  <div class="aurora-glow-2"></div>
  
  <div class="glass-card max-w-[480px] w-full p-8 md:p-10 text-center flex flex-col items-center gap-6">
    <div class="w-20 h-20 rounded-full bg-red-500/10 border border-red-500/25 flex items-center justify-center text-4xl shadow-lg shadow-red-500/10">
      🔒
    </div>
    
    <div>
      <h2 class="text-3xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight mb-2">Access Denied</h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">You do not have the required permissions to view this resource.</p>
    </div>
    
    <button 
      class="w-full py-3.5 rounded-2xl bg-primary hover:bg-primary-hover text-slate-950 font-bold text-lg shadow-lg shadow-primary/20 transition-all cursor-pointer" 
      (click)="goToDashboard()">
      Go to Dashboard
    </button>
  </div>
</div>
