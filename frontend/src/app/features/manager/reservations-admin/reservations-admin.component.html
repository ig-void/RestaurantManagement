<div class="max-w-7xl mx-auto px-4 py-8 relative">
  <div class="aurora-glow-1"></div>
  <div class="aurora-glow-2"></div>

  <h2 class="text-3xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight mb-1.5">Reservation Queue</h2>
  <p class="text-sm text-slate-500 dark:text-slate-400 mb-8 font-medium">Confirm, check-in, complete or cancel customer reservations</p>

  <!-- Alert Message -->
  @if (errorMessage()) {
    <div class="mb-6 p-4 bg-red-500/10 border border-red-500/25 text-red-550 dark:text-red-400 rounded-xl text-sm font-semibold animate-pulse">
      {{ errorMessage() }}
    </div>
  }

  <!-- Search Filters -->
  <div class="flex flex-wrap gap-4 mb-6 items-center">
    <input 
      type="text" 
      class="form-input-field flex-1 min-w-[250px]" 
      placeholder="Search by customer name, restaurant or table number..."
      [value]="searchTerm" 
      (input)="onSearchChange($any($event.target).value)" />

    <select class="form-input-field max-w-[200px]" [(ngModel)]="filterRestaurant" (change)="loadReservations()">
      <option [value]="null">All Restaurants</option>
      @for (r of restaurants; track r.id) {
        <option [value]="r.id">{{ r.name }}</option>
      }
    </select>

    <input 
      type="date" 
      class="form-input-field max-w-[200px]" 
      [(ngModel)]="filterDate" 
      (change)="loadReservations()" />

    <select class="form-input-field max-w-[200px]" [(ngModel)]="filterStatus" (change)="loadReservations()">
      <option [value]="null">All Statuses</option>
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Checked-In">Checked-In</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>

  <!-- Grid Component -->
  <app-server-grid
    [columns]="columns"
    [data]="reservations()"
    [totalCount]="totalCount"
    [pageNumber]="pageNumber()"
    [pageSize]="pageSize"
    [loading]="loading()"
    [actions]="gridActions"
    (sort)="onSort($event)"
    (pageChange)="onPageChange($event)"
    (action)="onGridAction($event)">
  </app-server-grid>

  <!-- Confirmation dialog for Actions -->
  @if (showConfirmDialog()) {
    <app-confirm-dialog
      [title]="confirmTitle()"
      [message]="confirmMessage()"
      (confirm)="handleActionConfirm($event)">
    </app-confirm-dialog>
  }
</div>
